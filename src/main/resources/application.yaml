spring:
  application:
    name: backend-guardrail-system

  jackson:
    time-zone: Asia/Kolkata


  datasource:
    url: jdbc:postgresql://localhost:5432/guardrail_db?options=-c%20TimeZone=Asia/Kolkata
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8082